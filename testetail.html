<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Primeiro Código Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="max-w-sm bg-white rounded-2xl shadow-xl overflow-hidden hover:scale-105 transition-transform duration-300">
    
    <div class="h-32 bg-gradient-to-r from-blue-500 to-purple-600"></div>

    <div class="p-6 text-center">
      <div class="w-24 h-24 bg-gray-300 border-4 border-white rounded-full mx-auto -mt-16 mb-4 flex items-center justify-center text-3xl">
        🚀
      </div>

      <h2 class="text-2xl font-bold text-gray-800">Dev Iniciante</h2>
      <p class="text-gray-500 text-sm mb-4">Aprendendo Tailwind CSS e criando interfaces incríveis.</p>

      <div class="flex space-x-2 justify-center">
        <button class="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors">
          Seguir
        </button>
        <button class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition-colors">
          Mensagem
        </button>
      </div>
    </div>

    <div class="bg-gray-50 p-4 border-t border-gray-100 flex justify-around text-sm text-gray-600">
      <div><strong>12k</strong> Seguidores</div>
      <div><strong>540</strong> Seguindo</div>
    </div>
  </div>

</body>
</html>
